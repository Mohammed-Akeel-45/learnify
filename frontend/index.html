<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Learnify - AI-Powered Learning Platform. Generate personalized roadmaps, courses, and quizzes." />
  <title>Learnify - AI Learning Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">🎓</span>
          <span class="logo-text">Learnify</span>
        </div>
        <button id="sidebar-close" class="sidebar-close">&times;</button>
      </div>
      <ul class="nav-links">
        <li><a href="#/dashboard" class="nav-link active" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</a></li>
        <li><a href="#/roadmap" class="nav-link" data-page="roadmap"><span class="nav-icon">🗺️</span> Roadmap</a></li>
        <li><a href="#/courses" class="nav-link" data-page="courses"><span class="nav-icon">📚</span> Courses</a></li>
        <li><a href="#/quiz" class="nav-link" data-page="quiz"><span class="nav-icon">❓</span> Quiz</a></li>
        <li><a href="#/ai-assistant" class="nav-link" data-page="ai-assistant"><span class="nav-icon">🤖</span> AI Assistant</a></li>
        <li><a href="#/about" class="nav-link" data-page="about"><span class="nav-icon">ℹ️</span> About Us</a></li>
        <li><a href="#/contact" class="nav-link" data-page="contact"><span class="nav-icon">✉️</span> Contact Us</a></li>
      </ul>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
      <!-- Top Bar -->
      <header class="topbar">
        <button id="hamburger" class="hamburger">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-actions">
          <div class="profile-dropdown" id="profile-dropdown">
            <button class="profile-btn" id="profile-btn">
              <div class="avatar" id="user-avatar">?</div>
            </button>
            <div class="dropdown-menu" id="dropdown-menu">
              <div class="dropdown-user-info" id="dropdown-user-info">
                <span class="dropdown-name">Guest</span>
                <span class="dropdown-email">Not logged in</span>
              </div>
              <hr class="dropdown-divider">
              <button class="dropdown-item" id="auth-btn">Login</button>
            </div>
          </div>
        </div>
      </header>

      <!-- Page Content Container -->
      <div id="page-content" class="page-content">
        <!-- Pages will be rendered here -->
      </div>
    </main>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal">
      <div class="modal glass-card">
        <button class="modal-close" id="auth-modal-close">&times;</button>
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Login</button>
          <button class="auth-tab" data-tab="register">Register</button>
        </div>
        <form id="login-form" class="auth-form">
          <h2>Welcome Back</h2>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Login</button>
          <div id="login-error" class="form-error"></div>
        </form>
        <form id="register-form" class="auth-form" style="display:none;">
          <h2>Create Account</h2>
          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Min 6 characters" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Register</button>
          <div id="register-error" class="form-error"></div>
        </form>
      </div>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
